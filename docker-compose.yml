version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: finsight-postgres
    environment:
      POSTGRES_USER: finsight
      POSTGRES_PASSWORD: finsight123
      POSTGRES_DB: finsightdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finsight"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: finsight-redis
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant
    container_name: finsight-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage

volumes:
  pgdata:
  qdrantdata: